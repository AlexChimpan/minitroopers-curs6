# Application name
quarkus.application.name=maintenance-service

# HTTP configuration
quarkus.http.root-path=/maintenance-service
quarkus.http.port=8080
quarkus.http.cors=true

# Log level
quarkus.log.level=INFO
quarkus.log.console.enable=true


quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=AndreiTinca
quarkus.datasource.password=postgres

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/project_db
quarkus.datasource.jdbc.max-size=16

# Hibernate ORM configuration for auto schema generation
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
